<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Poll Display</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/display.css">
</head>
<body>

  <!-- Error view -->
  <div id="error-view" class="error-fullscreen" style="display:none">
    <h1>Invalid Event</h1>
    <p id="error-msg">Please use a valid link with an event code, e.g.<br>
       <code>/display.html?event=MYCONF2026</code></p>
  </div>

  <!-- Main display: 3-panel layout -->
  <div id="display-view" class="display-grid" style="display:none">

    <!-- LEFT: QR Code Panel -->
    <aside class="panel-left">
      <div class="qr-section">
        <h2>Scan to Vote</h2>
        <div id="qr-container" class="qr-container"></div>
        <p class="qr-url" id="qr-url-text"></p>
      </div>
      <div class="event-info">
        <span class="event-label">Event</span>
        <span class="event-code" id="event-title"></span>
      </div>
      <div class="total-section">
        <span class="total-label">Total Submissions</span>
        <span class="total-count" id="total-count">0</span>
      </div>
    </aside>

    <!-- CENTER: Map -->
    <div id="map" class="map-pane"></div>

    <!-- RIGHT: Leaderboard -->
    <aside class="panel-right">
      <div class="leaderboard-header">
        <h2>Top 10 Countries</h2>
      </div>
      <ol id="leaderboard" class="leaderboard"></ol>
    </aside>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/countries.js"></script>
  <script src="/js/display.js"></script>
</body>
</html>
